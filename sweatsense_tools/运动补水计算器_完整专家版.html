<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>全能运动补水决策系统 - 完整专家版</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.card { background: #0f172a; border: 1px solid #1e293b; padding: 1.5rem; border-radius: 1rem; }
.label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.25rem; }
.value { font-weight: 800; color: #34d399; }
</style>
</head>
<body class="bg-slate-950 text-slate-200 p-8">
<div class="max-w-7xl mx-auto">
<h1 class="text-3xl font-bold text-emerald-400 mb-6">全能运动补水决策系统 (完整参数版)</h1>
<div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

<!-- 左侧：参数与计算器 -->
<div class="lg:col-span-4 space-y-4">
<div class="card">
<h2 class="font-bold text-amber-400 mb-4">🛠️ 个人生理与物理参数</h2>
<div class="grid grid-cols-2 gap-4">
<div><label class="label">体重(kg)</label><input id="weight" type="number" value="70" class="w-full bg-slate-800 p-2 rounded"></div>
<div><label class="label">时长(h)</label><input id="duration" type="number" value="2" class="w-full bg-slate-800 p-2 rounded"></div>
</div>
<div class="mt-4">
<label class="label">运动项目(MET)</label>
<select id="met" class="w-full bg-slate-800 p-2 rounded">
<option value="10">跑步(10)</option><option value="8">骑行(8)</option>
</select>
</div>
<div class="mt-4 border-t border-slate-700 pt-4">
<label class="flex items-center gap-2 font-bold text-amber-400">
<input type="checkbox" id="useSelfTest"> 🧬 开启黄金自测反馈
</label>
<div id="selfTestFields" class="hidden mt-2 grid grid-cols-2 gap-2">
<input id="preW" placeholder="跑前重(kg)" class="bg-slate-800 p-2 rounded text-xs">
<input id="postW" placeholder="跑后重(kg)" class="bg-slate-800 p-2 rounded text-xs">
<input id="drink" placeholder="实饮(ml)" class="col-span-2 bg-slate-800 p-2 rounded text-xs">
</div>
</div>
</div>
</div>

<!-- 右侧：完整数据流 -->
<div class="lg:col-span-8 space-y-6">

<!-- 物理参数详情 -->
<div class="grid grid-cols-4 gap-4">
<div class="card text-center"><p class="label">总能耗废热(M)</p><p id="valM" class="value">--</p></div>
<div class="card text-center"><p class="label">蓄热量(S)</p><p id="valS" class="value">--</p></div>
<div class="card text-center"><p class="label">呼吸散热(Eres)</p><p id="valEres" class="value">--</p></div>
<div class="card text-center"><p class="label">蒸发效率(Reff)</p><p id="valReff" class="value">--</p></div>
</div>

<!-- 三阶段分配与物资转换 -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="card border-l-4 border-sky-500">
<h3 class="font-bold text-sky-400 mb-2">阶段1：跑前</h3>
<p id="planPre" class="text-xs"></p>
</div>
<div class="card border-l-4 border-emerald-500">
<h3 class="font-bold text-emerald-400 mb-2">阶段2：跑中</h3>
<p id="planDuring" class="text-xs"></p>
</div>
<div class="card border-l-4 border-fuchsia-500">
<h3 class="font-bold text-fuchsia-400 mb-2">阶段3：跑后</h3>
<p id="planPost" class="text-xs"></p>
</div>
</div>

</div>
</div>
</div>

<script>
function update() {
const weight = parseFloat(document.getElementById('weight').value);
const duration = parseFloat(document.getElementById('duration').value);
const met = parseFloat(document.getElementById('met').value);

// 物理参数计算
const M = met * weight * duration * 3.5 / 200 * 60 * 0.8;
const S = weight * 0.83 * 0.22;
const Eres = duration * 293.7;
const Reff = 57.0;

document.getElementById('valM').innerText = M.toFixed(1) + ' kcal';
document.getElementById('valS').innerText = S.toFixed(1) + ' kcal';
document.getElementById('valEres').innerText = Eres.toFixed(1) + ' kcal';
document.getElementById('valReff').innerText = Reff + '%';

// 自测逻辑
let sweatRate;
if (document.getElementById('useSelfTest').checked) {
sweatRate = ((parseFloat(document.getElementById('preW').value || 70) - parseFloat(document.getElementById('postW').value || 69)) * 1000 + parseFloat(document.getElementById('drink').value || 500)) / duration;
} else {
sweatRate = (M - S - Eres) / (Reff/100) * 0.58;
}

// 物资转换
const totalSalt = (sweatRate * duration / 1000) * 2.3;

document.getElementById('planPre').innerText = `补水 ${Math.round(weight * 5.5)}ml，预储备盐分 0.5g`;
document.getElementById('planDuring').innerText = `每小时需补：${Math.round(sweatRate * 0.6)}ml 运动饮料 + ${Math.ceil(totalSalt/2)} 粒盐丸`;
document.getElementById('planPost').innerText = `补足余量 ${Math.round(sweatRate * duration * 0.4)}ml，补充快速碳水 30g`;
}

document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', () => {
document.getElementById('selfTestFields').classList.toggle('hidden', !document.getElementById('useSelfTest').checked);
update();
}));

update();
</script>
</body>
</html>

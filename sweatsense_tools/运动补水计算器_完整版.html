<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>全能运动补水决策系统 - 完整版</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.param-card { background: #0f172a; border: 1px solid #1e293b; padding: 1.5rem; border-radius: 1rem; }
.result-box { background: #020617; border-left: 4px solid #10b981; padding: 1rem; margin-top: 1rem; }
</style>
</head>
<body class="bg-slate-950 text-slate-200 p-8">
<div class="max-w-6xl mx-auto">
<h1 class="text-3xl font-bold text-emerald-400 mb-6">全能运动补水决策系统 (完整科学版)</h1>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

<!-- 参数设置 -->
<div class="col-span-1 space-y-4">
<div class="param-card">
<h2 class="font-bold text-lg mb-4 text-emerald-400">基础参数</h2>

<label class="block text-xs">运动项目</label>
<select id="sport" class="w-full bg-slate-800 p-2 rounded mb-2">
<option value="10">跑步 (高代谢)</option>
<option value="8">骑行</option>
</select>

<label class="block text-xs">运动强度 (RPE)</label>
<select id="intensity" class="w-full bg-slate-800 p-2 rounded mb-4">
<option value="1">中强度 (Normal)</option>
<option value="1.5">高强度 (High)</option>
</select>

<div class="border-t border-slate-700 pt-4 mt-4">
<label class="flex items-center gap-2 font-bold text-amber-400">
<input type="checkbox" id="useSelfTest"> 开启黄金自测反馈
</label>
<div id="selfTest" class="hidden mt-2 space-y-2">
<input type="number" id="preW" placeholder="前体重(kg)" class="w-full bg-slate-800 p-2 rounded text-sm">
<input type="number" id="postW" placeholder="后体重(kg)" class="w-full bg-slate-800 p-2 rounded text-sm">
<input type="number" id="drink" placeholder="期间实际饮水(ml)" class="w-full bg-slate-800 p-2 rounded text-sm">
</div>
</div>
</div>
</div>

<!-- 数据结果 -->
<div class="col-span-2 space-y-6">

<!-- 核心数据展示 -->
<div class="grid grid-cols-3 gap-4">
<div class="param-card text-center"><p class="text-[10px] text-slate-500">排汗率(ml/h)</p><p id="vSweat" class="text-xl font-bold text-emerald-400">--</p></div>
<div class="param-card text-center"><p class="text-[10px] text-slate-500">总汗量(ml)</p><p id="vTotal" class="text-xl font-bold text-amber-400">--</p></div>
<div class="param-card text-center"><p class="text-[10px] text-slate-500">总流盐(g)</p><p id="vSalt" class="text-xl font-bold text-red-400">--</p></div>
</div>

<!-- 三阶段方案 -->
<div id="plan" class="space-y-4">
<div class="result-box"><h3 class="font-bold text-sky-400">阶段 1：跑前充盈</h3><p id="planPre" class="text-sm"></p></div>
<div class="result-box border-emerald-500"><h3 class="font-bold text-emerald-400">阶段 2：跑中对冲</h3><p id="planDuring" class="text-sm"></p></div>
<div class="result-box border-fuchsia-500"><h3 class="font-bold text-fuchsia-400">阶段 3：跑后重建</h3><p id="planPost" class="text-sm"></p></div>
</div>

</div>
</div>
</div>

<script>
const calc = () => {
const useSelf = document.getElementById('useSelfTest').checked;
const sportMet = parseFloat(document.getElementById('sport').value);
const intensity = parseFloat(document.getElementById('intensity').value);
const duration = 2.0;

let sweatRate;
if (useSelf) {
sweatRate = ((parseFloat(document.getElementById('preW').value || 70) - parseFloat(document.getElementById('postW').value || 69)) * 1000 + parseFloat(document.getElementById('drink').value || 500)) / duration;
} else {
sweatRate = sportMet * 70 * intensity * 0.9;
}

const totalSweat = sweatRate * duration;
const totalSalt = (totalSweat / 1000) * 2.3;

document.getElementById('vSweat').innerText = Math.round(sweatRate);
document.getElementById('vTotal').innerText = Math.round(totalSweat);
document.getElementById('vSalt').innerText = totalSalt.toFixed(1);

// 三阶段换算逻辑（硬编码示例值）
document.getElementById('planPre').innerText = `补水 ${Math.round(70 * 5.5)}ml，含盐 0.5g`;
document.getElementById('planDuring').innerText = `每小时需 ${Math.round(sweatRate * 0.6)}ml 水，配合 ${Math.ceil(totalSalt * 0.6 / 0.5)} 粒盐丸`;
document.getElementById('planPost').innerText = `需补足剩余缺口 ${Math.round(totalSweat * 0.4)}ml，加餐盐分 2g`;
};

[...document.querySelectorAll('input, select')].forEach(el => el.addEventListener('input', calc));
calc();
</script>
</body>
</html>
